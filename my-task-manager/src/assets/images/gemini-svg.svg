<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>

    <!-- Icon Gradient (Primary) -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>

    <!-- Checkmark Gradient (Success) -->
    <linearGradient id="successGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Mode Rounded Background -->
  <rect width="800" height="800" rx="160" fill="url(#bgGrad)" />

  <!-- Logo Mark Container -->
  <g transform="translate(180, 180)">
    
    <!-- Background Track / Task Container Card (Top) -->
    <rect x="110" y="40" width="220" height="50" rx="25" fill="#334155" opacity="0.6"/>
    <circle cx="60" cy="65" r="25" fill="url(#accentGrad)" opacity="0.4"/>

    <!-- Middle Task Track -->
    <rect x="110" y="180" width="310" height="50" rx="25" fill="#334155" opacity="0.6"/>
    <circle cx="60" cy="205" r="25" fill="url(#primaryGrad)" opacity="0.4"/>

    <!-- Bottom Task Track -->
    <rect x="110" y="320" width="260" height="50" rx="25" fill="#334155" opacity="0.6"/>
    
    <!-- The Dynamic Checkmark (The Core Feature) -->
    <path d="M 10 325 L 105 410 L 390 115" 
          fill="none" 
          stroke="url(#successGrad)" 
          stroke-width="56" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)"/>

    <!-- Intersecting Detail for Depth -->
    <circle cx="105" cy="410" r="28" fill="#059669" />
  </g>
</svg>
